*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#FFF0F5;font-family:'DM Sans',sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideR{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .4s ease both}
.pi{animation:popIn .32s cubic-bezier(.34,1.56,.64,1) both}
.sr{animation:slideR .32s ease both}
.pulse{animation:pulse 2s ease infinite}
.spin{animation:spin .8s linear infinite}
.bP{padding:9px 20px;border-radius:30px;border:none;font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#E91E8C,#F06292);color:white;box-shadow:0 4px 14px rgba(233,30,140,.28);transition:filter .2s,transform .15s;}
.bP:hover{filter:brightness(1.1);transform:translateY(-1px);}
.bO{padding:9px 20px;border-radius:30px;border:1.5px solid rgba(136,14,79,.25);font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:700;cursor:pointer;background:transparent;color:#880E4F;transition:background .2s;}
.bO:hover{background:#FCE4EC;}
.bD{padding:9px 20px;border-radius:30px;border:none;font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:700;cursor:pointer;background:#2D1B2E;color:white;}
.bF{width:100%;padding:14px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#E91E8C,#F06292);color:white;box-shadow:0 6px 22px rgba(233,30,140,.3);transition:filter .2s,transform .15s;margin-top:8px;}

.bF:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.slot{padding:10px 4px;border-radius:13px;text-align:center;cursor:pointer;transition:all .15s;}
.slot:hover:not(.slotF):not(.slotM){transform:translateY(-2px);box-shadow:0 4px 14px rgba(233,30,140,.2);}
.hItem,.rankItem{transition:transform .15s;}
.hItem:hover{transform:translateX(3px);}
.rankItem:hover{transform:translateX(4px);}
.logroCard{transition:transform .2s,box-shadow .2s;}

input:focus,select:focus{border-color:#E91E8C!important;outline:none;box-shadow:0 0 0 3px rgba(233,30,140,.1);}

<script type="text/babel">
const { useState, useEffect } = React;

// ── SUPABASE ──────────────────────────────────────────────────
const SUPABASE_URL  = "https://zlqpxnktiywzhqtkbuwx.supabase.co";
const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpscXB4bmt0aXl3emhxdGtidXd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDY4MDAsImV4cCI6MjA4ODk4MjgwMH0.S6xAj5Mj786Jshz4ZAej0P1_5v1HCxc-wqmskWe86iY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── CONSTANTES ────────────────────────────────────────────────
const MESES  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_L = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const DIAS_C = ["dom","lun","mar","mié","jue","vie","sáb"];
const FEST   = new Set(["2026-01-01","2026-01-12","2026-03-23","2026-04-02","2026-04-03","2026-05-01","2026-05-18","2026-06-08","2026-06-29","2026-07-20","2026-08-07","2026-08-17","2026-10-12","2026-11-02","2026-11-16","2026-12-08","2026-12-25"]);
const pad = n => n < 10 ? "0"+n : ""+n;
const fh  = h => h < 12 ? `${h}:00 AM` : h === 12 ? "12:00 PM" : `${h-12}:00 PM`;
const dk  = (y,m,d) => `${y}-${pad(m+1)}-${pad(d)}`;
const CAP = 14;
const K   = {pink:"#E91E8C",deep:"#2D1B2E",cream:"#FFF0F5",mocha:"#880E4F",gold:"#F06292",rose:"#F48FB1",lr:"#FCE4EC"};
const dayType = (y,m,d) => { const w=new Date(y,m,d).getDay(); if(w===0)return"sun"; if(FEST.has(dk(y,m,d)))return"fest"; if(w===6)return"sat"; return"wk"; };
const hoursOf = (t,dow) => { if(t==="sun")return[]; if(t==="sat")return[6,7,8,9,10]; if(t==="fest")return[7,8,9,10]; if(dow===5)return[5,6,7,8,9,16,17,18,19]; return[5,6,7,8,9,16,17,18,19,20]; };

// ── LOGROS ────────────────────────────────────────────────────
const LOGROS = [
  { id:"primera",    icon:"🌸", nombre:"Primera vez",   desc:"Asististe a tu primera clase",  req:(a)=>a>=1  },
  { id:"cinco",      icon:"⚡", nombre:"5 clases",       desc:"Completaste 5 clases",          req:(a)=>a>=5  },
  { id:"madrugadora",icon:"🌅", nombre:"Madrugadora",   desc:"5 clases antes de las 7am",     req:(a,r)=>r.filter(x=>x.estado==="asistida"&&+x.hora<=6).length>=5 },
  { id:"diez",       icon:"🔥", nombre:"10 clases",      desc:"Completaste 10 clases",         req:(a)=>a>=10 },
  { id:"racha3",     icon:"💫", nombre:"Racha x3 sem",  desc:"3 semanas consecutivas",         req:(a,r)=>calcStreak(r)>=3 },
  { id:"mes",        icon:"🏆", nombre:"Mes perfecto",   desc:"12+ clases en un mes",          req:(a,r)=>maxMes(r)>=12 },
  { id:"veinte",     icon:"👑", nombre:"20 clases",      desc:"Completaste 20 clases",         req:(a)=>a>=20 },
  { id:"cincuenta",  icon:"💎", nombre:"50 clases",      desc:"¡Leyenda del gym!",             req:(a)=>a>=50 },
];

function calcStreak(reservas){
  const weeks=new Set(reservas.filter(r=>r.estado==="asistida").map(r=>{
    const d=new Date(r.fecha),j=new Date(d.getFullYear(),0,1);
    return d.getFullYear()+"-W"+Math.ceil(((d-j)/86400000+j.getDay()+1)/7);
  }));
  return weeks.size;
}
// 1 punto por asistencia + 3 puntos por cada progreso de reto
function calcPuntos(reservas, progresosReto){
  const ptsAtt=reservas.filter(r=>r.estado==="asistida").length * 1;
  const ptsReto=(progresosReto||[]).length * 3;
  return ptsAtt + ptsReto;
}
function maxMes(reservas){
  const map={};
  reservas.filter(r=>r.estado==="asistida").forEach(r=>{const k=r.fecha.slice(0,7);map[k]=(map[k]||0)+1;});
  return Math.max(0,...Object.values(map));
}

        </div>;
      })}
    </div>
  </div>;
}

// ── BOOKING ───────────────────────────────────────────────────
function Booking({user,setUser,toast,onVerRanking}){
  const now=new Date();
  const [cy,setCy]=useState(now.getFullYear()),[cm,setCm]=useState(now.getMonth());
  const [selDate,setSel]=useState(null),[selH,setSelH]=useState(null);
  const [slots,setSlots]=useState([]),[modal,setModal]=useState(false),[loading,setLoading]=useState(false);

  async function buildSlots(k){
    setLoading(true);
    const {data}=await sb.from("reservas").select("hora,estado,usuaria_id").eq("fecha",k).in("estado",["confirmada","asistida"]);
    const taken={};
    (data||[]).forEach(r=>{taken[r.hora]=(taken[r.hora]||0)+1;});
    const my=new Set((data||[]).filter(r=>r.usuaria_id===user.id&&r.estado==="confirmada").map(r=>r.hora));
    const [y,m,d]=k.split("-").map(Number);
    const dow2=new Date(y,m-1,d).getDay(); const hs=hoursOf(dayType(y,m-1,d),dow2);
    setSlots(hs.map(h=>({h,taken:taken[pad(h)]||0,mine:my.has(pad(h))})));
    setLoading(false);
  }

  function pickDate(k){setSel(k);setSelH(null);buildSlots(k);}
  function nav(dir){let nm=cm+dir,ny=cy;if(nm>11){nm=0;ny++;}if(nm<0){nm=11;ny--;}setCm(nm);setCy(ny);setSel(null);setSelH(null);setSlots([]);}

  async function confirm(){
    if(user.plan==="basico"&&(user.clases_mes||0)>=12){toast("⚠️ Límite","12 clases del plan Básico agotadas.");setModal(false);return;}
    await sb.from("reservas").insert({usuaria_id:user.id,fecha:selDate,hora:pad(selH),estado:"confirmada"});
    await sb.from("perfiles").update({clases_mes:(user.clases_mes||0)+1,clases_total:(user.clases_total||0)+1}).eq("id",user.id);
    setUser({...user,clases_mes:(user.clases_mes||0)+1,clases_total:(user.clases_total||0)+1});
    toast("🎉 ¡Reserva confirmada!",`${fh(selH)} · ¡Cada clase suma al ranking!`);
    setModal(false);setSelH(null);buildSlots(selDate);
  }

  async function cancelSlot(h){
    await sb.from("reservas").update({estado:"cancelada"}).eq("usuaria_id",user.id).eq("fecha",selDate).eq("hora",pad(h)).eq("estado","confirmada");
    const nm=Math.max(0,(user.clases_mes||0)-1),nt=Math.max(0,(user.clases_total||0)-1);
    await sb.from("perfiles").update({clases_mes:nm,clases_total:nt}).eq("id",user.id);
    setUser({...user,clases_mes:nm,clases_total:nt});
    toast("✕ Cancelada","Tu lugar fue liberado.");
    buildSlots(selDate);
  }

  const [yd,md,dd]=selDate?selDate.split("-").map(Number):[0,0,0];
  const dow=selDate?new Date(yd,md-1,dd).getDay():0;

  return <div style={{paddingTop:64}}>
    <div style={{background:`linear-gradient(145deg,${K.deep},#4a0e3a)`,padding:"80px 24px 64px",textAlign:"center",position:"relative",overflow:"hidden"}}>
      <div style={{fontSize:"10rem",position:"absolute",top:-30,left:-10,opacity:.04,lineHeight:1,userSelect:"none",pointerEvents:"none"}}>✿</div>
      <div className="fu">
        <div style={{marginBottom:16,display:"flex",justifyContent:"center"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(.9rem,2.5vw,1.3rem)",letterSpacing:"3px",color:"rgba(255,255,255,.9)",fontWeight:700}}>
            <span style={{color:K.gold}}>AV</span> FITNESS CLUB
          </div>
        </div>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(1.9rem,5vw,3.4rem)",color:"white",lineHeight:1.1,marginBottom:14}}>Elige tu hora.<br/><em style={{fontStyle:"italic",color:K.gold}}>La clase es sorpresa.</em></h1>
        <p style={{color:"rgba(255,255,255,.5)",fontSize:".93rem",maxWidth:420,margin:"0 auto 28px",lineHeight:1.75}}>Reserva, asiste y sube en el ranking. Cada clase suma. 🏆</p>
        <button className="bP" style={{padding:"13px 30px",fontSize:".9rem"}} onClick={()=>document.getElementById("ba")?.scrollIntoView({behavior:"smooth"})}>Reservar ahora ✦</button>
      </div>
    </div>
    <RankingBanner user={user} onVerRanking={onVerRanking}/>
    <div className="fu" style={{padding:"36px 20px",maxWidth:840,margin:"0 auto"}} id="ba">
      <div style={{fontSize:".65rem",color:K.pink,textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700,marginBottom:7}}>Reservas</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(1.4rem,2.5vw,1.9rem)",marginBottom:8}}>Reserva tu <em style={{fontStyle:"italic",color:K.pink}}>lugar</em></div>
      <div style={{fontSize:".81rem",color:"#9A7A72",marginBottom:26}}>{user.plan==="basico"?<><strong style={{color:K.mocha}}>{user.clases_mes||0}/12 clases</strong> este mes · Plan Básico{user.fecha_vencimiento&&<VencimientoBanner fecha={user.fecha_vencimiento}/>}</>:"Plan Premium · Ilimitado ✦"}</div>
      <Cal cy={cy} cm={cm} sel={selDate} onPick={pickDate} onNav={nav}/>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))",gap:9}}>
            {slots.map(({h,taken,mine})=>{
              const full=taken>=CAP&&!mine,left=CAP-taken,isSel=selH===h;
              let bg=K.lr,bo=`1.5px solid rgba(196,97,74,.15)`,co=K.mocha,cu="pointer";
              if(mine){bg=`linear-gradient(135deg,${K.deep},#4a0e3a)`;bo=`1.5px solid ${K.deep}`;co="white";}
              else if(full){bg="#f0ebe8";co="#bbb";cu="not-allowed";}
              else if(isSel){bg=K.pink;bo=`1.5px solid ${K.pink}`;co="white";}
              return <div key={h} className={`slot${mine?" slotM":""}${full?" slotF":""}`} onClick={()=>mine?cancelSlot(h):!full&&setSelH(h)} style={{background:bg,border:bo,color:co,cursor:cu}}>
                <div style={{fontSize:".9rem",fontWeight:700}}>{pad(h)}:00</div>
                <span style={{fontSize:".52rem",opacity:.65,display:"block",marginTop:1}}>{h<12?"AM":"PM"}</span>
                <span style={{fontSize:".52rem",display:"block",marginTop:3,fontWeight:700,opacity:.85}}>{mine?"✕ Cancelar":full?"Lleno":`${left} cupos`}</span>
              </div>;
            })}
          </div>
          {selH!==null&&!slots.find(sl=>sl.h===selH)?.mine&&(
            <div className="fu" style={{marginTop:16,background:K.lr,borderRadius:13,padding:"13px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <div style={{fontSize:".82rem",color:K.mocha}}>📅 <strong>{DIAS_C[dow]} {dd} {MESES[md-1]}</strong> &nbsp;⏰ <strong>{fh(selH)}</strong></div>
              <button className="bP" style={{padding:"10px 22px"}} onClick={()=>setModal(true)}>Confirmar ✦</button>
            </div>
          )}
        </>}
      </div>}
    </div>
    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(26,10,15,.82)",backdropFilter:"blur(8px)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&setModal(false)}>
      <div className="pi" style={{background:K.cream,borderRadius:24,padding:34,width:"100%",maxWidth:420,position:"relative",boxShadow:"0 24px 80px rgba(0,0,0,.3)"}}>
        <button onClick={()=>setModal(false)} style={{position:"absolute",top:14,right:16,background:"none",border:"none",fontSize:"1.1rem",color:"#9A7A72",cursor:"pointer"}}>✕</button>
        <div style={{fontSize:".63rem",color:K.rose,textTransform:"uppercase",letterSpacing:1,fontWeight:700,marginBottom:4}}>✦ Confirmar reserva</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.65rem",color:K.deep,marginBottom:18}}>¡Ya casi lista!</div>
        {[["Día",`${DIAS_C[dow]} ${dd} de ${MESES[md-1]}`],["Hora",fh(selH)],["Clase","🎲 Sorpresa"]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(244,143,177,.15)"}}>
            <span style={{fontSize:".68rem",color:"#9A7A72",textTransform:"uppercase"}}>{l}</span>
            <span style={{fontWeight:700,fontSize:".85rem",color:K.deep}}>{v}</span>
          </div>
        ))}
        <div style={{background:K.deep,borderRadius:12,padding:"13px 16px",display:"flex",gap:12,alignItems:"center",margin:"18px 0"}}>
          <span style={{fontSize:"1.4rem"}}>🏆</span>
          <p style={{fontSize:".73rem",color:"rgba(255,255,255,.45)",lineHeight:1.55,margin:0}}><strong style={{color:"white"}}>¡Esta clase suma al ranking!</strong> Asiste y sube posiciones.</p>
        </div>
        <button className="bF" onClick={confirm}>✦ Confirmar mi reserva</button>
      </div>
    </div>}
  </div>;
}

function Podio({ranking,userId}){
  if(ranking.length<1)return null;
  const top3=[ranking[1],ranking[0],ranking[2]].filter(Boolean);
  const medals=["🥈","🥇","🥉"];
  const heights=[80,100,65];
  const bgs=["linear-gradient(135deg,#e0e0e0,#bdbdbd)","linear-gradient(135deg,#FFD700,#FFA000)","linear-gradient(135deg,#cd7f32,#a0522d)"];
  const puestos=[2,1,3];
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1.15fr 1fr",gap:8,marginBottom:20,alignItems:"flex-end"}}>
    {top3.map((u,i)=>{
      const isMe=u.id===userId;
      return <div key={u.id} style={{textAlign:"center"}}>
        {isMe&&<div style={{fontSize:".6rem",fontWeight:700,color:K.pink,marginBottom:3}}>👈 Tú</div>}
        <div style={{fontSize:"1.2rem",marginBottom:3}}>{medals[i]}</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:".8rem",color:K.deep,fontWeight:700,marginBottom:1}}>{u.nombre.split(" ")[0]}</div>
        <div style={{fontSize:".63rem",color:"#9A7A72",marginBottom:6}}><strong>{u.puntos}</strong> pts</div>
        <div style={{height:heights[i],background:bgs[i],borderRadius:"10px 10px 0 0",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:i===1?"0 6px 20px rgba(255,215,0,.35)":"none"}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:"1.5rem",color:"white",fontWeight:700}}>#{puestos[i]}</span>
        </div>
      </div>;
    })}
  </div>;
}

function ListaRanking({ranking,userId}){
  if(ranking.length===0)return <div style={{padding:24,textAlign:"center",color:"#9A7A72",fontSize:".82rem"}}>Sin participantes en este plan aún.</div>;
  const medals=["🥇","🥈","🥉"];
  return <div style={{background:"white",borderRadius:18,border:"1px solid rgba(244,143,177,.15)",overflow:"hidden"}}>
    {ranking.map((u,i)=>{
      const isMe=u.id===userId;
      return <div key={u.id} className="rankItem" style={{padding:"13px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:i<ranking.length-1?"1px solid rgba(244,143,177,.1)":"none",background:isMe?"linear-gradient(135deg,rgba(233,30,140,.04),rgba(240,98,146,.04))":"white"}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:isMe?`linear-gradient(135deg,${K.pink},${K.gold})`:"#f5f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontSize:".85rem",fontWeight:700,color:isMe?"white":K.mocha,flexShrink:0}}>{medals[i]||`#${i+1}`}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:".83rem",color:K.deep,display:"flex",alignItems:"center",gap:6}}>
            {u.nombre}{isMe&&<span style={{fontSize:".58rem",background:K.lr,color:K.mocha,padding:"2px 7px",borderRadius:20,fontWeight:700}}>Tú</span>}
          </div>
          <div style={{fontSize:".67rem",color:"#9A7A72",marginTop:1}}>{u.logros} logros · {u.asistidas} clases</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.25rem",color:isMe?K.pink:K.deep,fontWeight:700}}>{u.puntos}</div>
          <div style={{fontSize:".58rem",color:"#9A7A72",textTransform:"uppercase"}}>puntos</div>
        </div>
      </div>;
    })}
  </div>;
}

// ── BANNER VENCIMIENTO ────────────────────────────────────────
function VencimientoBanner({fecha}){
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const vence=new Date(fecha);vence.setHours(0,0,0,0);
  const dias=Math.ceil((vence-hoy)/(1000*60*60*24));
  if(dias>7)return null;
  const vencido=dias<0,venceHoy=dias===0;
  const bg=vencido?"linear-gradient(135deg,#c62828,#e53935)":venceHoy?"linear-gradient(135deg,#e65100,#ff9800)":"linear-gradient(135deg,#f57f17,#ffa000)";
  const msg=vencido?"Tu plan venció — contáctanos para renovar 💬":venceHoy?"⚠️ Tu plan vence hoy — ¡Renueva para seguir entrenando!":dias===1?"Tu plan vence mañana — ¡Renueva a tiempo!":`⏰ Tu plan vence en ${dias} días`;
  return <div style={{background:bg,borderRadius:12,padding:"10px 14px",marginTop:10,display:"flex",alignItems:"center",gap:10}}>
    <span style={{fontSize:"1.2rem"}}>{vencido?"🔴":venceHoy?"🔔":"⏰"}</span>
    <span style={{fontSize:".76rem",color:"white",fontWeight:700,lineHeight:1.4}}>{msg}</span>
  </div>;
}

// ── DASHBOARD ─────────────────────────────────────────────────
function Dash({user,onBook,initTab="logros",onTabChange}){
  const [tab,setTab]=useState(initTab);
  function changeTab(k){setTab(k);onTabChange&&onTabChange(k);}
  const [reservas,setReservas]=useState([]);
  const [ranking,setRanking]=useState([]);
  const [loadingR,setLoadingR]=useState(true);

  useEffect(()=>{
    async function load(){
      setLoadingR(true);
      const {data:res}=await sb.from("reservas").select("*").eq("usuaria_id",user.id).order("fecha",{ascending:false});
      setReservas(res||[]);
      const {data:perfs}=await sb.from("perfiles").select("*").neq("email",ADMIN_EMAIL);
      const {data:allRes}=await sb.from("reservas").select("*");
      const {data:allProg}=await sb.from("reto_progreso").select("*");
      const rank=(perfs||[]).map(p=>{
        const r=(allRes||[]).filter(x=>x.usuaria_id===p.id);
        const att=r.filter(x=>x.estado==="asistida");
        const prog=allProg.filter(x=>x.usuaria_id===p.id);
        const puntos=calcPuntos(r,prog);
        return {...p,asistidas:att.length,puntos,streak:calcStreak(r),logros:LOGROS.filter(l=>l.req(att.length,r)).length};
      }).sort((a,b)=>b.puntos-a.puntos);
      setRanking(rank);
      setLoadingR(false);
    }
    load();
  },[user.id]);

  const now=new Date();
  const att=reservas.filter(r=>r.estado==="asistida");
  const upc=reservas.filter(r=>r.estado==="confirmada"&&r.fecha>=now.toISOString().slice(0,10));
  const streak=calcStreak(reservas);
  const logrosOK=LOGROS.filter(l=>l.req(att.length,reservas));
  const logrosNo=LOGROS.filter(l=>!l.req(att.length,reservas));
  const proximo=logrosNo[0];
  const miPuesto=ranking.findIndex(u=>u.id===user.id)+1;
  const nivel=att.length>=50?{n:"💎 Diamante",c:"#b9f2ff",t:"#0097a7"}:att.length>=20?{n:"👑 Reina",c:"#fff9c4",t:"#f57f17"}:att.length>=10?{n:"🔥 On Fire",c:"#ffe0b2",t:"#e65100"}:att.length>=5?{n:"⚡ En Llamas",c:"#fce4ec",t:"#880E4F"}:{n:"🌸 Iniciando",c:"#f3e5f5",t:"#7b1fa2"};
  const bdg=e=>({background:e==="asistida"?"#e8f5e9":e==="cancelada"?"#f5f5f5":"#fce4ec",color:e==="asistida"?"#2e7d32":e==="cancelada"?"#aaa":K.mocha,padding:"4px 12px",borderRadius:20,fontSize:".63rem",fontWeight:700});

  if(loadingR)return <div style={{paddingTop:64}}><Spinner/></div>;

  return <div style={{paddingTop:64}}>
    <div style={{background:`linear-gradient(135deg,${K.deep},#4a0e3a)`,padding:"46px 24px 26px",position:"relative",overflow:"hidden"}}>
      <div style={{fontSize:"10rem",position:"absolute",right:-10,bottom:-50,opacity:.04,lineHeight:1,userSelect:"none",pointerEvents:"none"}}>❀</div>
      <div className="fu" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
        <div>
          <div style={{fontSize:".7rem",color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>✦ Mi perfil · AV FITNESS CLUB</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.8rem",color:"white",marginBottom:10}}>{user.nombre}</div>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(244,143,177,.15)",border:"1px solid rgba(244,143,177,.25)",color:K.rose,padding:"5px 15px",borderRadius:20,fontSize:".67rem",fontWeight:700,textTransform:"uppercase"}}>{user.plan==="premium"?"Plan Premium ✦":"Plan Básico"}</div>
          {user.fecha_vencimiento&&<VencimientoBanner fecha={user.fecha_vencimiento}/>}
        </div>
        <div style={{background:nivel.c,borderRadius:20,padding:"14px 20px",textAlign:"center",minWidth:130}}>
          <div style={{fontSize:"1.8rem",marginBottom:4}}>{nivel.n.split(" ")[0]}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:".9rem",color:nivel.t,fontWeight:700}}>{nivel.n.split(" ").slice(1).join(" ")}</div>
          <div style={{fontSize:".6rem",color:nivel.t,opacity:.7,marginTop:3,textTransform:"uppercase"}}>{att.length} asistidas</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:18}}>
        {[["🏆",miPuesto?`#${miPuesto}`:"—","Ranking"],["⭐",ranking.find(u=>u.id===user.id)?.puntos||0,"Puntos"],["✅",att.length,"Asistidas"],["🔥",streak,"Racha"]].map(([ic,v,l])=>(
          <div key={l} style={{background:"rgba(255,255,255,.07)",borderRadius:13,padding:"11px 6px",textAlign:"center",border:"1px solid rgba(255,255,255,.07)"}}>
            <div style={{fontSize:"1rem",marginBottom:2}}>{ic}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:K.gold,lineHeight:1}}>{v}</div>
            <div style={{fontSize:".52rem",color:"rgba(255,255,255,.35)",textTransform:"uppercase",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
    </div>

    {streak>=2&&<div style={{background:"linear-gradient(135deg,#ff6f00,#ffa000)",padding:"13px 22px",display:"flex",alignItems:"center",gap:12,color:"white"}}>
      <span className="pulse" style={{fontSize:"1.7rem"}}>🔥</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:".88rem"}}>¡{streak} semanas de racha activa!</div>
        <div style={{fontSize:".7rem",opacity:.85}}>No la rompas — reserva tu próxima clase ya</div>
      </div>
      <button className="bP" style={{padding:"7px 14px",fontSize:".7rem",whiteSpace:"nowrap"}} onClick={onBook}>Reservar ✦</button>
    </div>}

    <div style={{display:"flex",borderBottom:"2px solid rgba(244,143,177,.2)",background:"white",paddingLeft:8}}>
      {[["logros","🏅 Logros"],["retos","🏁 Retos"],["ranking","🏆 Ranking"],["historial","📋 Historial"]].map(([k,l])=>(
        <button key={k} onClick={()=>changeTab(k)} style={{padding:"14px 16px",border:"none",background:"transparent",fontFamily:"'DM Sans',sans-serif",fontSize:".76rem",fontWeight:700,cursor:"pointer",color:tab===k?K.pink:"#9A7A72",borderBottom:`2px solid ${tab===k?K.pink:"transparent"}`,marginBottom:-2,transition:"all .2s"}}>{l}</button>
      ))}
    </div>

    {tab==="logros"&&<div style={{padding:"22px"}}>
      {proximo&&<div style={{background:`linear-gradient(135deg,${K.deep},#4a0e3a)`,borderRadius:18,padding:"18px 20px",marginBottom:22,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <div style={{fontSize:"2.2rem",filter:"grayscale(1)",opacity:.5}}>{proximo.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:".6rem",color:K.rose,textTransform:"uppercase",letterSpacing:1,fontWeight:700,marginBottom:3}}>Próximo logro</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"white"}}>{proximo.nombre}</div>
          <div style={{fontSize:".72rem",color:"rgba(255,255,255,.45)",marginTop:2}}>{proximo.desc}</div>
        </div>
        <div style={{background:"rgba(255,255,255,.08)",borderRadius:10,padding:"8px 14px",textAlign:"center"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:K.gold}}>{att.length}</div>
          <div style={{fontSize:".58rem",color:"rgba(255,255,255,.35)"}}>clases</div>
        </div>
      </div>}
      {logrosOK.length>0&&<>
        <div style={{fontSize:".68rem",color:K.mocha,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,marginBottom:12}}>✦ Desbloqueados ({logrosOK.length})</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:24}}>
          {logrosOK.map(l=>(
            <div key={l.id} className="logroCard" style={{background:"white",borderRadius:18,padding:"18px 12px",textAlign:"center",border:`1.5px solid rgba(233,30,140,.2)`,boxShadow:"0 4px 16px rgba(233,30,140,.08)"}}>
              <div style={{fontSize:"2rem",marginBottom:7}}>{l.icon}</div>
              <div style={{fontWeight:700,fontSize:".8rem",color:K.deep,marginBottom:3}}>{l.nombre}</div>
              <div style={{fontSize:".63rem",color:"#9A7A72",lineHeight:1.4,marginBottom:8}}>{l.desc}</div>
              <div style={{fontSize:".58rem",background:K.lr,color:K.mocha,padding:"3px 10px",borderRadius:20,display:"inline-block",fontWeight:700}}>✓ Logrado</div>
            </div>
          ))}
        </div>
      </>}
      {logrosNo.length>0&&<>
        <div style={{fontSize:".68rem",color:"#9A7A72",textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,marginBottom:12}}>🔒 Por desbloquear ({logrosNo.length})</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
          {logrosNo.map(l=>(
            <div key={l.id} className="logroCard" style={{background:"#f9f6f6",borderRadius:18,padding:"18px 12px",textAlign:"center",border:"1.5px solid rgba(0,0,0,.05)",opacity:.65}}>
              <div style={{fontSize:"2rem",marginBottom:7,filter:"grayscale(1)"}}>{l.icon}</div>
              <div style={{fontWeight:700,fontSize:".8rem",color:"#bbb",marginBottom:3}}>{l.nombre}</div>
              <div style={{fontSize:".63rem",color:"#ccc",lineHeight:1.4,marginBottom:8}}>{l.desc}</div>
              <div style={{fontSize:".58rem",background:"#eee",color:"#aaa",padding:"3px 10px",borderRadius:20,display:"inline-block"}}>🔒 Bloqueado</div>
            </div>
          ))}
        </div>
      </>}
      {att.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#9A7A72"}}>
        <div style={{fontSize:"3rem",marginBottom:12}}>🎯</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",marginBottom:8}}>¡Empieza a ganar logros!</div>
        <div style={{fontSize:".82rem",marginBottom:20}}>Asiste a clases para desbloquear medallas.</div>
        <button className="bP" style={{padding:"11px 26px"}} onClick={onBook}>Reservar ahora ✦</button>
      </div>}
    </div>}

    {tab==="ranking"&&<div style={{padding:"22px"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:K.deep,marginBottom:4}}>Ranking 🏆</div>
      <div style={{fontSize:".77rem",color:"#9A7A72",marginBottom:20}}>🏋️ 1 pt por asistir · 🏅 3 pts por reto · Tiempo real</div>

      {/* Selector plan */}
      {(()=>{
        const [planSel,setPlanSel]=React.useState(user.plan||"basico");
        const rankFiltrado=ranking.filter(u=>u.plan===planSel);
        const miPuestoFiltrado=rankFiltrado.findIndex(u=>u.id===user.id)+1;
        return <>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {[["basico","📋 Básico — 12 clases"],["premium","⭐ Premium — Ilimitado"]].map(([p,l])=>(
              <button key={p} onClick={()=>setPlanSel(p)} style={{flex:1,padding:"10px",borderRadius:30,border:`2px solid ${planSel===p?K.pink:"rgba(136,14,79,.2)"}`,background:planSel===p?K.pink:"white",color:planSel===p?"white":K.mocha,fontFamily:"'DM Sans',sans-serif",fontSize:".72rem",fontWeight:700,cursor:"pointer",transition:"all .2s"}}>{l}</button>
            ))}
          </div>

          {/* Mi posición en este plan */}
          {miPuestoFiltrado>0&&<div style={{background:`linear-gradient(135deg,${K.deep},#4a0e3a)`,borderRadius:14,padding:"12px 18px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:".75rem",color:"rgba(255,255,255,.6)"}}>Tu posición en {planSel==="basico"?"Plan Básico":"Plan Premium"}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.4rem",color:K.gold,fontWeight:700}}>#{miPuestoFiltrado}</div>
          </div>}

          <Podio ranking={rankFiltrado} userId={user.id}/>
          <ListaRanking ranking={rankFiltrado} userId={user.id}/>
        </>;
      })()}

      <div style={{marginTop:14,background:K.lr,borderRadius:13,padding:"13px 16px",fontSize:".76rem",color:K.mocha,textAlign:"center",lineHeight:1.6}}>
        🏋️ <strong>1 pt</strong> por asistir · 🏅 <strong>3 pts</strong> por reto · Cada plan compite entre sí 💪
      </div>
    </div>}

    {tab==="retos"&&<Retos user={user} toast={(t,s)=>alert(t)}/>}
    {tab==="historial"&&<div style={{padding:"22px 22px 50px"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep,marginBottom:14}}>Historial de reservas</div>
      {reservas.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#9A7A72"}}>
        <div style={{fontSize:"2.5rem",marginBottom:12}}>📋</div>
        <div style={{marginBottom:16}}>Sin reservas aún.</div>
        <button className="bP" style={{padding:"11px 26px"}} onClick={onBook}>Reservar ✦</button>
      </div>:reservas.map(r=>{const[ry,rm,rd]=r.fecha.split("-");return(
        <div key={r.id} className="hItem" style={{background:"white",borderRadius:14,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid rgba(244,143,177,.14)",marginBottom:9}}>
          <div><div style={{fontSize:".83rem",fontWeight:700,color:K.deep}}>{rd} {MESES[+rm-1]} {ry}</div><div style={{fontSize:".72rem",color:"#9A7A72",marginTop:2}}>⏰ {fh(+r.hora)} · 🎲 Sorpresa</div></div>
          <span style={bdg(r.estado)}>{r.estado==="asistida"?"✅ Asistida":r.estado==="cancelada"?"Cancelada":"✦ Confirmada"}</span>
        </div>
      );})}
    </div>}
    {tab==="retos"&&<RetosAlumna user={user}/>}
  </div>;
}

function AdminRetos({toast}){
  const [retos,setRetos]=useState([]);

  const [form,setForm]=useState({titulo:"",desc:"",emoji:"🏅",tipo:"numero",meta:10,fecha_fin:""});
  const [creando,setCreando]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

  async function loadRetos(){
    setLoading(true);
    const {data}=await sb.from("retos").select("*").order("created_at",{ascending:false});
    setRetos(data||[]);
    setLoading(false);
  }
  useEffect(()=>{loadRetos();},[]);

  async function crearReto(){
    if(!form.titulo||!form.fecha_fin){toast("⚠️ Error","Título y fecha fin son obligatorios.");return;}
    await sb.from("retos").insert({titulo:form.titulo,descripcion:form.desc,emoji:form.emoji,tipo:form.tipo,meta:+form.meta,fecha_fin:form.fecha_fin,activo:true});

    await sb.from("retos").update({activo:!activo}).eq("id",id);
    loadRetos();

    await sb.from("retos").delete().eq("id",id);

      </div>
      <button className="bP" onClick={()=>setCreando(true)}>+ Nuevo reto</button>

    {creando&&<div className="fu" style={{background:"white",borderRadius:18,border:`1.5px solid ${K.pink}`,padding:22,marginBottom:20}}>

        <div style={{gridColumn:"1/-1"}}><LBL ch="Descripción"/>{INP("desc","Ej: Camina al menos 8.000 pasos cada día")}</div>
        <div>

            {["🏅","🔥","💪","🚶","🧘","💧","🥗","⚡","🏃","🌟","🎯","👑"].map(e=><option key={e} value={e}>{e}</option>)}

function RetosAlumna({user}){
  const [retos,setRetos]=useState([]);
  const [progreso,setProgreso]=useState({});
  const [loading,setLoading]=useState(true);
  const [reportando,setReportando]=useState(null);
  const [valor,setValor]=useState("");
  const today=new Date().toISOString().slice(0,10);

  useEffect(()=>{
    async function load(){
      setLoading(true);
      const {data:rs}=await sb.from("retos").select("*").eq("activo",true).gte("fecha_fin",today);
      const {data:pr}=await sb.from("reto_progreso").select("*").eq("usuaria_id",user.id);
      const {data:todos}=await sb.from("reto_progreso").select("*");
      const map={};
      (pr||[]).forEach(p=>{if(!map[p.reto_id])map[p.reto_id]=[];map[p.reto_id].push(p);});
      // ranking por reto
      const rankMap={};
      (rs||[]).forEach(r=>{
        const participantes={};
        (todos||[]).filter(p=>p.reto_id===r.id).forEach(p=>{
          if(!participantes[p.usuaria_id])participantes[p.usuaria_id]={total:0,dias:0};
          if(r.tipo==="sino"&&p.valor==="1"){participantes[p.usuaria_id].total++;participantes[p.usuaria_id].dias++;}
          else if(r.tipo==="numero"){participantes[p.usuaria_id].total+=+p.valor;participantes[p.usuaria_id].dias++;}
        });
        rankMap[r.id]=Object.entries(participantes).sort((a,b)=>b[1].total-a[1].total);
      });
      setRetos(rs||[]);
      setProgreso({misRegistros:map,ranking:rankMap});
      setLoading(false);
    }
    load();
  },[user.id]);

  async function reportar(reto){
    const v=reto.tipo==="sino"?"1":valor;
    if(reto.tipo==="numero"&&(!v||isNaN(+v)||+v<0)){return;}
    // verificar si ya reportó hoy
    const misReg=progreso.misRegistros[reto.id]||[];
    if(misReg.find(p=>p.fecha===today)){return;}
    await sb.from("reto_progreso").insert({reto_id:reto.id,usuaria_id:user.id,fecha:today,valor:v});
    setReportando(null);setValor("");
    // reload
    const {data:pr}=await sb.from("reto_progreso").select("*").eq("usuaria_id",user.id);
    const {data:todos}=await sb.from("reto_progreso").select("*");
    const map={};
    (pr||[]).forEach(p=>{if(!map[p.reto_id])map[p.reto_id]=[];map[p.reto_id].push(p);});
    const rankMap={};
    retos.forEach(r=>{
      const participantes={};
      (todos||[]).filter(p=>p.reto_id===r.id).forEach(p=>{
        if(!participantes[p.usuaria_id])participantes[p.usuaria_id]={total:0,dias:0};
        if(r.tipo==="sino"&&p.valor==="1"){participantes[p.usuaria_id].total++;participantes[p.usuaria_id].dias++;}
        else if(r.tipo==="numero"){participantes[p.usuaria_id].total+=+p.valor;participantes[p.usuaria_id].dias++;}
      });
      rankMap[r.id]=Object.entries(participantes).sort((a,b)=>b[1].total-a[1].total);
    });
    setProgreso({misRegistros:map,ranking:rankMap});
  }

  if(loading)return <Spinner/>;
  if(retos.length===0)return <div style={{textAlign:"center",padding:"48px 20px",color:"#9A7A72"}}>
    <div style={{fontSize:"3rem",marginBottom:12}}>🏁</div>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:K.deep,marginBottom:8}}>Sin retos activos</div>
    <div style={{fontSize:".8rem"}}>Tu entrenadora publicará retos pronto 💪</div>
  </div>;

  return <div style={{padding:"22px 22px 50px"}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep,marginBottom:4}}>Retos del mes 🏁</div>
    <div style={{fontSize:".77rem",color:"#9A7A72",marginBottom:20}}>Completa los retos diarios y gana medallas</div>
    {retos.map(reto=>{
      const misReg=progreso.misRegistros[reto.id]||[];
      const yaHoyReg=misReg.find(p=>p.fecha===today);
      const totalMio=reto.tipo==="sino"?misReg.filter(p=>p.valor==="1").length:misReg.reduce((s,p)=>s+(+p.valor||0),0);
      const rank=progreso.ranking[reto.id]||[];
      const miPuesto=rank.findIndex(([id])=>id===user.id)+1;
      const diasFin=Math.ceil((new Date(reto.fecha_fin)-new Date())/(1000*60*60*24));
      const completado=reto.tipo==="sino"?misReg.filter(p=>p.valor==="1").length>=reto.meta:totalMio>=(reto.meta*misReg.length);

      return <div key={reto.id} style={{background:"white",borderRadius:20,border:`1.5px solid ${completado?"rgba(233,30,140,.3)":"rgba(244,143,177,.2)"}`,padding:"20px",marginBottom:16,boxShadow:completado?"0 4px 20px rgba(233,30,140,.1)":"none"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:16}}>
          <div style={{fontSize:"2.4rem"}}>{reto.emoji}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{fontWeight:700,fontSize:".92rem",color:K.deep}}>{reto.titulo}</div>
              {completado&&<span style={{fontSize:".6rem",background:`linear-gradient(135deg,${K.pink},${K.gold})`,color:"white",padding:"2px 10px",borderRadius:20,fontWeight:700}}>🏅 ¡Completado!</span>}
            </div>
            <div style={{fontSize:".73rem",color:"#9A7A72",marginTop:2}}>{reto.descripcion}</div>
            <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
              {miPuesto>0&&<span style={{fontSize:".62rem",background:K.lr,color:K.mocha,padding:"2px 9px",borderRadius:20,fontWeight:700}}>🏆 #{miPuesto} en ranking</span>}
              <span style={{fontSize:".62rem",background:"#f5f5f5",color:"#666",padding:"2px 9px",borderRadius:20}}>⏳ {diasFin>0?`${diasFin} días`:"Último día"}</span>
              {reto.tipo==="numero"&&<span style={{fontSize:".62rem",background:"#f5f5f5",color:"#666",padding:"2px 9px",borderRadius:20}}>Meta: {reto.meta}/día</span>}
            </div>
          </div>
        </div>

        {/* Ranking mini */}
        {rank.length>0&&<div style={{background:K.lr,borderRadius:12,padding:"10px 14px",marginBottom:14}}>
          <div style={{fontSize:".6rem",color:K.mocha,textTransform:"uppercase",fontWeight:700,letterSpacing:1,marginBottom:8}}>Ranking del reto</div>
          {rank.slice(0,3).map(([id,stats],i)=>{
            const medals=["🥇","🥈","🥉"];
            const isMe=id===user.id;
            return <div key={id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:i<2?"6px":"0",background:isMe?"rgba(233,30,140,.08)":"transparent",borderRadius:8,padding:"4px 6px"}}>
              <span style={{fontSize:".8rem"}}>{medals[i]}</span>
              <span style={{flex:1,fontSize:".75rem",fontWeight:isMe?700:400,color:isMe?K.mocha:K.deep}}>{isMe?"Tú":id.slice(0,8)+"..."}</span>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:".9rem",color:isMe?K.pink:K.deep,fontWeight:700}}>{reto.tipo==="sino"?`${stats.total} días`:stats.total.toLocaleString()}</span>
            </div>;
          })}
        </div>}

        {/* Reportar */}
        {!yaHoyReg?<div>
          {reportando===reto.id?<div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            {reto.tipo==="numero"&&<input type="number" placeholder={`Ej: ${reto.meta}`} value={valor} onChange={e=>setValor(e.target.value)} style={{flex:1,minWidth:120,padding:"10px 13px",border:`1.5px solid ${K.pink}`,borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:".88rem",color:K.deep,background:"white",boxSizing:"border-box"}}/>}
            <button className="bP" style={{padding:"10px 20px"}} onClick={()=>reportar(reto)}>{reto.tipo==="sino"?"✅ Sí, lo hice":"Guardar"}</button>
            <button className="bO" style={{padding:"10px 16px"}} onClick={()=>{setReportando(null);setValor("");}}>Cancelar</button>
          </div>
          :<button onClick={()=>setReportando(reto.id)} style={{width:"100%",padding:"11px",borderRadius:30,border:`1.5px solid ${K.pink}`,background:"transparent",color:K.pink,fontFamily:"'DM Sans',sans-serif",fontSize:".78rem",fontWeight:700,cursor:"pointer",transition:"all .2s"}} onMouseOver={e=>e.target.style.background=K.lr} onMouseOut={e=>e.target.style.background="transparent"}>
            {reto.tipo==="sino"?"¿Completaste el reto hoy? ✦":"Reportar progreso de hoy ✦"}
          </button>}
        </div>
        :<div style={{textAlign:"center",padding:"10px",background:"#e8f5e9",borderRadius:10,fontSize:".78rem",color:"#2e7d32",fontWeight:700}}>
          ✅ Ya reportaste hoy — vuelve mañana
        </div>}
      </div>;
    })}
  </div>;
}

// ── CLASES HOY (vista agrupada por hora) ──────────────────────
function ClasesHoy({hoy,attend,cancelR}){
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const horaActual=now.getHours();

  // Solo clases de HOY
  const reservasHoy=(hoy||[]).filter(r=>r.fecha===todayStr);

  // Agrupar por hora
  const grupos={};
  reservasHoy.forEach(r=>{
    if(!grupos[r.hora])grupos[r.hora]=[];
    grupos[r.hora].push(r);
  });

  // Ordenar: clase en curso primero, luego por hora
  const horasOrdenadas=Object.keys(grupos).sort((a,b)=>{
    const ha=parseInt(a),hb=parseInt(b);
    const aActual=ha===horaActual,bActual=hb===horaActual;
    if(aActual)return -1;
    if(bActual)return 1;
    return ha-hb;
  });

  const total=reservasHoy.length;
  const asistidas=reservasHoy.filter(r=>r.estado==="asistida").length;
  const pendientes=reservasHoy.filter(r=>r.estado==="confirmada").length;

  const hoyFmt=new Date();
  const [,mes,dia]=[hoyFmt.getFullYear(),hoyFmt.getMonth(),hoyFmt.getDate()];

  if(total===0)return <div style={{textAlign:"center",padding:"48px 20px"}}>
    <div style={{fontSize:"3rem",marginBottom:12}}>📅</div>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep,marginBottom:6}}>Sin clases hoy</div>
    <div style={{fontSize:".8rem",color:"#9A7A72"}}>No hay reservas para hoy.</div>
  </div>;

  return <div>
    {/* Resumen */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
      {[[total,"Reservadas","#2D1B2E"],[asistidas,"Asistidas","#2e7d32"],[pendientes,"Pendientes","#E91E8C"]].map(([v,l,c])=>(
        <div key={l} style={{background:"white",borderRadius:14,padding:"14px 10px",textAlign:"center",border:"1px solid rgba(244,143,177,.15)"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.8rem",color:c,lineHeight:1,marginBottom:4}}>{v}</div>
          <div style={{fontSize:".62rem",color:"#9A7A72",textTransform:"uppercase",letterSpacing:".5px",fontWeight:700}}>{l}</div>
        </div>
      ))}
    </div>

    {/* Clases del día agrupadas por hora */}
    {horasOrdenadas.map(hora=>{
      const reservas=grupos[hora];
      const h=parseInt(hora);
      const yaPaso=h<horaActual;
      const esAhora=h===horaActual;
      const attCount=reservas.filter(r=>r.estado==="asistida").length;
      const tot=reservas.length;

      return <div key={hora} style={{marginBottom:16,border:esAhora?`2px solid ${K.pink}`:"none",borderRadius:18}}>
        {/* Header */}
        <div style={{background:esAhora?`linear-gradient(135deg,${K.pink},${K.gold})`:yaPaso?"#4a4a4a":"linear-gradient(135deg,#3d0d30,#2D1B2E)",borderRadius:esAhora?"16px 16px 0 0":"16px 16px 0 0",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:esAhora?"white":yaPaso?"#888":"rgba(255,255,255,.4)"}}/>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:"white",fontWeight:700}}>{fh(h)}</div>
              <div style={{fontSize:".65rem",color:"rgba(255,255,255,.6)",marginTop:1,fontWeight:700}}>
                {esAhora?"🟢 CLASE EN CURSO":yaPaso?"Clase terminada":"Próxima clase"}
              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.6rem",color:"white",fontWeight:700}}>{attCount}<span style={{fontSize:".9rem",opacity:.6}}>/{tot}</span></div>
            <div style={{fontSize:".58rem",color:"rgba(255,255,255,.5)",textTransform:"uppercase"}}>asistieron</div>
          </div>
        </div>

        {/* Lista alumnas */}
        <div style={{background:"white",borderRadius:"0 0 16px 16px",border:"1px solid rgba(244,143,177,.15)",borderTop:"none",overflow:"hidden"}}>
          {reservas.map((r,i)=>{
            const asistio=r.estado==="asistida";
            const cancelada=r.estado==="cancelada";
            return <div key={r.id} style={{padding:"13px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:i<reservas.length-1?"1px solid rgba(244,143,177,.07)":"none",background:asistio?"rgba(76,175,80,.08)":"white",transition:"background .3s"}}>
              {/* Avatar */}
              <div style={{width:42,height:42,borderRadius:"50%",background:asistio?"linear-gradient(135deg,#4caf50,#2e7d32)":`linear-gradient(135deg,${K.pink},${K.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"white",fontWeight:700,flexShrink:0,boxShadow:asistio?"0 2px 10px rgba(76,175,80,.3)":"0 2px 10px rgba(233,30,140,.2)"}}>

function Admin({toast}){
  const [tab,setTab]=useState("hoy");
  const [hoy,setHoy]=useState([]);
  const [prox,setProx]=useState([]);
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);

  async function load(){
    setLoading(true);
    const today=new Date().toISOString().slice(0,10);
    // Traer TODOS los perfiles (incluyendo admin para el map)
    const {data:perfs,error:perfsErr}=await sb.from("perfiles").select("*");
    const perfilMap={};
    (perfs||[]).forEach(p=>{perfilMap[p.id]=p;});
    // Traer reservas
    const {data:resHoy}=await sb.from("reservas").select("*").in("estado",["confirmada","asistida"]).order("fecha",{ascending:false}).limit(200);
    const {data:resProx}=await sb.from("reservas").select("*").eq("estado","confirmada").gt("fecha",today).order("fecha").limit(30);
    const {data:allRes}=await sb.from("reservas").select("*");
    // Join manual — agrega perfil a cada reserva
    const hoyConPerfil=(resHoy||[]).map(r=>({...r,perfil:perfilMap[r.usuaria_id]||{nombre:"Sin nombre",plan:"basico"}}));
    const proxConPerfil=(resProx||[]).map(r=>({...r,perfil:perfilMap[r.usuaria_id]||{nombre:"Sin nombre",plan:"basico"}}));
    // Ranking solo sin admin
    const sinAdmin=(perfs||[]).filter(p=>p.email!==ADMIN_EMAIL);
    const {data:allProg2}=await sb.from("reto_progreso").select("*");
    const rank=sinAdmin.map(p=>{
      const r=(allRes||[]).filter(x=>x.usuaria_id===p.id);
      const att=r.filter(x=>x.estado==="asistida");
      const prog=(allProg2||[]).filter(x=>x.usuaria_id===p.id);
      const puntos=calcPuntos(r,prog);
      return {...p,asistidas:att.length,puntos,streak:calcStreak(r),logros:LOGROS.filter(l=>l.req(att.length,r)).length};
    }).sort((a,b)=>b.puntos-a.puntos);
    setHoy(hoyConPerfil);setProx(proxConPerfil);setUsers(rank);setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function attend(id){
    // 1. Buscar la reserva en el estado actual para obtener usuaria_id
    const reserva=hoy.find(r=>r.id===id)||prox.find(r=>r.id===id);
    // 2. Marcar como asistida
    await sb.from("reservas").update({estado:"asistida"}).eq("id",id);
    // 3. Actualizar contadores en perfiles
    if(reserva?.usuaria_id){
      const {data:perfil}=await sb.from("perfiles").select("clases_mes,clases_total").eq("id",reserva.usuaria_id).single();
      if(perfil){
        await sb.from("perfiles").update({
          clases_mes:(perfil.clases_mes||0)+1,
          clases_total:(perfil.clases_total||0)+1
        }).eq("id",reserva.usuaria_id);
      }
    }
    toast("✅ Asistencia marcada","¡El puntaje fue actualizado!");
    load();
  }
  async function cancelR(id){
    // Buscar reserva para restar contador si estaba confirmada
    const reserva=hoy.find(r=>r.id===id)||prox.find(r=>r.id===id);
    await sb.from("reservas").update({estado:"cancelada"}).eq("id",id);
    // Si estaba confirmada, restar del contador
    if(reserva?.usuaria_id&&reserva.estado==="confirmada"){
      const {data:perfil}=await sb.from("perfiles").select("clases_mes,clases_total").eq("id",reserva.usuaria_id).single();
      if(perfil){
        await sb.from("perfiles").update({
          clases_mes:Math.max(0,(perfil.clases_mes||0)-1),
          clases_total:Math.max(0,(perfil.clases_total||0)-1)
        }).eq("id",reserva.usuaria_id);
      }
    }
    toast("✕ Cancelada","");
    load();
  }

  const pill=c=>({background:c==="g"?"#e8f5e9":c==="r"?"#fce4ec":"#f5f5f5",color:c==="g"?"#2e7d32":c==="r"?K.mocha:"#999",padding:"3px 10px",borderRadius:20,fontSize:".62rem",fontWeight:700});
  const TH=({c})=><th style={{background:K.deep,color:"white",padding:"10px 13px",textAlign:"left",fontSize:".6rem",textTransform:"uppercase",letterSpacing:".8px",whiteSpace:"nowrap"}}>{c}</th>;
  const TD=({c,st})=><td style={{padding:"10px 13px",borderBottom:"1px solid rgba(244,143,177,.1)",color:K.deep,fontSize:".78rem",...st}}>{c}</td>;

  return <div style={{paddingTop:64}}>
    <div style={{padding:"26px 22px 60px"}}>
      <div className="fu">
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.6rem",color:K.deep,marginBottom:2}}>Panel de Administración</div>
        <div style={{fontSize:".72rem",color:K.rose,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:18}}>AV FITNESS CLUB</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[["hoy","📅 Clases del día"],["users","👥 Alumnas"],["crear","➕ Nueva alumna"],["retos","🏁 Retos"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"8px 17px",borderRadius:30,border:`1.5px solid ${tab===k?K.deep:"rgba(136,14,79,.2)"}`,background:tab===k?K.deep:"transparent",color:tab===k?"white":K.mocha,fontFamily:"'DM Sans',sans-serif",fontSize:".74rem",fontWeight:700,cursor:"pointer",transition:"all .2s"}}>{l}</button>
        ))}
      </div>
      {tab==="retos"?<GestionRetos toast={toast}/>
      :tab==="crear"?<CrearAlumna toast={toast} onCreada={()=>{setTab("users");load();}}/>
      :loading?<Spinner/>
      :tab==="hoy"?<ClasesHoy hoy={hoy} attend={attend} cancelR={cancelR}/>
      :<div style={{overflowX:"auto",borderRadius:16,border:"1px solid rgba(244,143,177,.15)"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>
            {["#","Nombre","Plan","Puntos","Vence","Logros","Racha","✏️"].map(h=><TH key={h} c={h}/>)}
          </tr></thead>
          <tbody>
            {tab==="users"&&(users.length===0?<tr><td colSpan={6} style={{padding:22,textAlign:"center",color:"#9A7A72",background:"white"}}>Sin usuarias aún</td></tr>
            :users.map((u,i)=>{
              const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
              const vence=u.fecha_vencimiento?new Date(u.fecha_vencimiento):null;
              const hoy2=new Date();hoy2.setHours(0,0,0,0);
              const diasV=vence?Math.ceil((vence-hoy2)/(1000*60*60*24)):null;
              const venceHoy=diasV===0,vencido=diasV<0;
              return <tr key={u.id} style={{background:i===0?"rgba(255,215,0,.04)":venceHoy?"rgba(255,152,0,.06)":vencido?"rgba(244,67,54,.04)":"white"}}>
                <TD c={<span style={{fontWeight:700}}>{medal||`#${i+1}`}</span>}/>
                <TD c={<strong>{u.nombre}</strong>}/>
                <TD c={<span style={pill(u.plan==="premium"?"g":"r")}>{u.plan}</span>}/>
                <TD c={<strong style={{color:K.pink}}>{u.puntos||0} pts</strong>} st={{textAlign:"center"}}/>
                <TD c={u.fecha_vencimiento?<span style={{fontSize:".72rem",fontWeight:700,color:vencido?"#f44336":venceHoy?"#ff9800":"#2e7d32"}}>{vencido?"⚠️ Vencido":venceHoy?"🔔 Hoy":diasV===1?"Mañana":`${diasV}d`}</span>:<span style={{color:"#ccc",fontSize:".7rem"}}>—</span>}/>
                <TD c={`${u.logros} 🏅`} st={{textAlign:"center"}}/>
                <TD c={`${u.streak} sem.`} st={{textAlign:"center"}}/>
                <TD c={<EditarAlumna uid={u.id} fecha={u.fecha_vencimiento} plan={u.plan} onSaved={load}/>}/>
              </tr>;
            }))}

          </tbody>
        </table>
      </div>}
    </div>
  </div>;
}

// SQL requerido en Supabase:
// CREATE TABLE retos (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), titulo TEXT NOT NULL, descripcion TEXT, tipo TEXT DEFAULT 'boolean' CHECK (tipo IN ('boolean','numero')), unidad TEXT, meta NUMERIC, fecha_inicio DATE, fecha_fin DATE, activo BOOLEAN DEFAULT true, created_at TIMESTAMPTZ DEFAULT NOW());
// CREATE TABLE reto_progreso (id UUID PRIMARY KEY DEFAULT gen_random_uuid(), reto_id UUID REFERENCES retos(id) ON DELETE CASCADE, usuaria_id UUID REFERENCES perfiles(id) ON DELETE CASCADE, fecha DATE NOT NULL, valor NUMERIC DEFAULT 0, created_at TIMESTAMPTZ DEFAULT NOW(), UNIQUE(reto_id, usuaria_id, fecha));
// ALTER TABLE reto_progreso ENABLE ROW LEVEL SECURITY;
// ALTER TABLE retos ENABLE ROW LEVEL SECURITY;
// CREATE POLICY "retos_ver" ON retos FOR SELECT USING (true);
// CREATE POLICY "progreso_propio" ON reto_progreso FOR ALL USING (auth.uid() = usuaria_id);
// CREATE POLICY "retos_admin" ON retos FOR ALL USING (true);

function Retos({user,toast}){
  const [retos,setRetos]=useState([]);
  const [progreso,setProgreso]=useState({});
  const [loading,setLoading]=useState(true);
  const [reportando,setReportando]=useState(null);
  const [val,setVal]=useState("");
  const today=new Date().toISOString().slice(0,10);

  async function load(){
    setLoading(true);
    const {data:rs}=await sb.from("retos").select("*").eq("activo",true).order("fecha_inicio",{ascending:false});
    const {data:ps}=await sb.from("reto_progreso").select("*").eq("usuaria_id",user.id);
    const pmap={};
    (ps||[]).forEach(p=>{if(!pmap[p.reto_id])pmap[p.reto_id]=[];pmap[p.reto_id].push(p);});
    setRetos(rs||[]);setProgreso(pmap);setLoading(false);
  }

  useEffect(()=>{load();},[]);

  async function reportar(reto){
    const valor=reto.tipo==="boolean"?1:parseFloat(val||0);
    if(reto.tipo==="numero"&&(!val||isNaN(valor))){toast("⚠️","Ingresa un número válido.");return;}
    await sb.from("reto_progreso").upsert({reto_id:reto.id,usuaria_id:user.id,fecha:today,valor},{onConflict:"reto_id,usuaria_id,fecha"});
    toast("✅ ¡Registrado!","Tu progreso fue guardado.");
    setReportando(null);setVal("");load();
  }

  function yaReportoHoy(retoId){
    return (progreso[retoId]||[]).some(p=>p.fecha===today);
  }
  function totalProgreso(retoId){
    return (progreso[retoId]||[]).reduce((s,p)=>s+(p.valor||0),0);
  }
  function completado(reto){
    if(reto.tipo==="boolean") return (progreso[reto.id]||[]).length>0;
    return totalProgreso(reto.id)>=(reto.meta||1);
  }
  function pct(reto){
    if(reto.tipo==="boolean") return completado(reto)?100:0;
    return Math.min(100,Math.round((totalProgreso(reto.id)/(reto.meta||1))*100));
  }

  if(loading)return <Spinner/>;
  if(retos.length===0)return <div style={{textAlign:"center",padding:"40px 20px",color:"#9A7A72"}}>
    <div style={{fontSize:"3rem",marginBottom:12}}>🏅</div>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep,marginBottom:8}}>Sin retos activos</div>
    <div style={{fontSize:".82rem"}}>Tu entrenadora publicará retos pronto. ¡Prepárate!</div>
  </div>;

  return <div style={{padding:"22px"}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:K.deep,marginBottom:4}}>Retos activos 🏅</div>
    <div style={{fontSize:".77rem",color:"#9A7A72",marginBottom:20}}>Completa los retos y gana medallas especiales</div>
    {retos.map(reto=>{
      const p=pct(reto),done=completado(reto),yaHoy=yaReportoHoy(reto.id),total=totalProgreso(reto.id);
      const fin=reto.fecha_fin?new Date(reto.fecha_fin):null;
      const diasLeft=fin?Math.ceil((fin-new Date())/(1000*60*60*24)):null;
      return <div key={reto.id} style={{background:"white",borderRadius:20,border:`2px solid ${done?"#a5d6a7":p>0?"rgba(233,30,140,.2)":"rgba(244,143,177,.15)"}`,marginBottom:16,overflow:"hidden",boxShadow:done?"0 4px 20px rgba(76,175,80,.15)":"0 4px 20px rgba(196,97,74,.06)"}}>
        {/* Header */}
        <div style={{background:done?`linear-gradient(135deg,#2e7d32,#43a047)`:`linear-gradient(135deg,${K.deep},#4a0e3a)`,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontSize:".6rem",color:done?"#a5d6a7":K.rose,textTransform:"uppercase",letterSpacing:1,fontWeight:700,marginBottom:4}}>{done?"✅ ¡Completado!":"🏅 Reto activo"}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"white",marginBottom:4}}>{reto.titulo}</div>
            <div style={{fontSize:".72rem",color:"rgba(255,255,255,.5)",lineHeight:1.5}}>{reto.descripcion}</div>
          </div>
          {done&&<div style={{fontSize:"2rem"}}>🥇</div>}
        </div>
        {/* Progreso */}
        <div style={{padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:".72rem",color:"#9A7A72"}}>
              {reto.tipo==="numero"?`${total} ${reto.unidad||""} de ${reto.meta} ${reto.unidad||""}`:done?"¡Lo lograste!":"Pendiente"}
            </div>
            <div style={{fontSize:".72rem",fontWeight:700,color:done?"#2e7d32":K.pink}}>{p}%</div>
          </div>
          <div style={{background:"#f5f0f0",borderRadius:20,height:8,overflow:"hidden",marginBottom:12}}>
            <div style={{height:"100%",borderRadius:20,background:done?`linear-gradient(135deg,#4caf50,#2e7d32)`:`linear-gradient(135deg,${K.pink},${K.gold})`,width:`${p}%`,transition:"width .5s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:".68rem",color:"#9A7A72"}}>
              {diasLeft!==null&&<span>{diasLeft>0?`⏳ ${diasLeft} días restantes`:"⏰ Venció hoy"}</span>}
            </div>
            {!done&&(yaHoy
              ?<div style={{fontSize:".72rem",background:"#e8f5e9",color:"#2e7d32",padding:"6px 14px",borderRadius:20,fontWeight:700}}>✓ Ya reportaste hoy</div>
              :<button onClick={()=>setReportando(reto.id)} style={{padding:"8px 18px",borderRadius:30,border:"none",background:`linear-gradient(135deg,${K.pink},${K.gold})`,color:"white",fontFamily:"'DM Sans',sans-serif",fontSize:".73rem",fontWeight:700,cursor:"pointer"}}>Reportar progreso ✦</button>
            )}
          </div>
          {/* Modal reporte */}
          {reportando===reto.id&&<div className="fu" style={{marginTop:14,background:K.lr,borderRadius:14,padding:"14px 16px"}}>
            <div style={{fontSize:".72rem",fontWeight:700,color:K.mocha,marginBottom:10}}>{reto.tipo==="boolean"?`¿Completaste: ${reto.titulo}?`:`¿Cuántos ${reto.unidad||"unidades"} hoy?`}</div>
            {reto.tipo==="numero"&&<input type="number" min="0" placeholder={`Ej: 5000 ${reto.unidad||""}`} value={val} onChange={e=>setVal(e.target.value)} style={{width:"100%",padding:"10px 12px",border:`1.5px solid rgba(196,97,74,.2)`,borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:".85rem",marginBottom:10,boxSizing:"border-box"}}/>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>reportar(reto)} style={{flex:1,padding:"9px",borderRadius:30,border:"none",background:`linear-gradient(135deg,${K.pink},${K.gold})`,color:"white",fontFamily:"'DM Sans',sans-serif",fontSize:".75rem",fontWeight:700,cursor:"pointer"}}>{reto.tipo==="boolean"?"✅ ¡Sí lo hice!":"Guardar"}</button>
              <button onClick={()=>{setReportando(null);setVal("");}} style={{padding:"9px 16px",borderRadius:30,border:`1px solid rgba(136,14,79,.2)`,background:"white",color:K.mocha,fontFamily:"'DM Sans',sans-serif",fontSize:".75rem",cursor:"pointer"}}>Cancelar</button>
            </div>
          </div>}
        </div>
      </div>;
    })}
  </div>;
}

// ── RANKING DE RETO ───────────────────────────────────────────
function RankingReto({reto,userId}){
  const [rank,setRank]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    async function load(){
      const {data:ps}=await sb.from("reto_progreso").select("*,perfiles(nombre)").eq("reto_id",reto.id);
      const map={};
      (ps||[]).forEach(p=>{
        if(!map[p.usuaria_id])map[p.usuaria_id]={nombre:p.perfiles?.nombre||"—",total:0,dias:0};
        map[p.usuaria_id].total+=p.valor||0;
        map[p.usuaria_id].dias++;
      });
      const sorted=Object.entries(map).map(([id,v])=>({id,...v})).sort((a,b)=>b.total-a.total||b.dias-a.dias);
      setRank(sorted);setLoading(false);
    }
    load();
  },[reto.id]);
  if(loading)return <div style={{padding:14,textAlign:"center",color:"#9A7A72",fontSize:".78rem"}}>Cargando ranking...</div>;
  if(rank.length===0)return <div style={{padding:14,textAlign:"center",color:"#9A7A72",fontSize:".78rem"}}>Aún nadie ha reportado progreso.</div>;
  const medals=["🥇","🥈","🥉"];
  return <div style={{background:"white",borderRadius:14,border:"1px solid rgba(244,143,177,.15)",overflow:"hidden",marginTop:10}}>
    <div style={{background:K.deep,padding:"8px 14px",fontSize:".62rem",color:K.rose,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>🏆 Ranking — {reto.titulo}</div>
    {rank.map((u,i)=>{
      const isMe=u.id===userId;
      return <div key={u.id} style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,borderBottom:i<rank.length-1?"1px solid rgba(244,143,177,.08)":"none",background:isMe?"rgba(233,30,140,.04)":"white"}}>
        <div style={{width:28,height:28,borderRadius:"50%",background:isMe?`linear-gradient(135deg,${K.pink},${K.gold})`:"#f5f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".8rem",fontWeight:700,color:isMe?"white":K.mocha,flexShrink:0}}>{medals[i]||`#${i+1}`}</div>
        <div style={{flex:1,fontSize:".8rem",fontWeight:700,color:K.deep}}>{u.nombre}{isMe&&<span style={{fontSize:".58rem",background:K.lr,color:K.mocha,padding:"2px 6px",borderRadius:20,marginLeft:6}}>Tú</span>}</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem",color:isMe?K.pink:K.deep,fontWeight:700}}>{reto.tipo==="boolean"?`${u.dias}d`:u.total} <span style={{fontSize:".6rem",color:"#9A7A72",fontFamily:"'DM Sans',sans-serif"}}>{reto.unidad||""}</span></div>
      </div>;
    })}
  </div>;
}

// ── CREAR RETO (admin) ────────────────────────────────────────
function CrearReto({toast,onCreado}){
  const [f,setF]=useState({titulo:"",descripcion:"",tipo:"boolean",unidad:"",meta:"",fecha_inicio:new Date().toISOString().slice(0,10),fecha_fin:""});
  const [msg,setMsg]=useState(null);
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const LBL=({ch})=><label style={{display:"block",fontSize:".66rem",color:K.mocha,textTransform:"uppercase",letterSpacing:".5px",fontWeight:700,marginBottom:5}}>{ch}</label>;
  const INP=(k,ph,t="text")=><input style={{width:"100%",padding:"11px 13px",border:"1.5px solid rgba(196,97,74,.18)",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:".85rem",color:K.deep,background:"white",display:"block",boxSizing:"border-box"}} type={t} placeholder={ph} value={f[k]} onChange={e=>set(k,e.target.value)}/>;
  async function crear(){
    if(!f.titulo){setMsg("El título es obligatorio.");return;}
    setBusy(true);
    await sb.from("retos").insert({titulo:f.titulo,descripcion:f.descripcion,tipo:f.tipo,unidad:f.unidad||null,meta:f.meta?parseFloat(f.meta):null,fecha_inicio:f.fecha_inicio||null,fecha_fin:f.fecha_fin||null,activo:true});
    setBusy(false);
    toast("🏅 Reto creado","Las alumnas ya pueden verlo y participar.");
    onCreado();
  }
  return <div style={{background:"white",borderRadius:20,border:"1px solid rgba(244,143,177,.2)",padding:24}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep,marginBottom:4}}>Crear nuevo reto</div>
    <div style={{fontSize:".77rem",color:"#9A7A72",marginBottom:20}}>Las alumnas lo verán en su perfil y podrán reportar progreso diario</div>
    {msg&&<div style={{background:"#fce4ec",border:"1px solid #f48fb1",color:K.mocha,padding:"10px 14px",borderRadius:10,fontSize:".8rem",marginBottom:14}}>{msg}</div>}
    <div style={{display:"grid",gap:14}}>
      <div><LBL ch="Título del reto"/>{INP("titulo","Ej: 10.000 pasos diarios")}</div>
      <div><LBL ch="Descripción"/>
        <textarea value={f.descripcion} onChange={e=>set("descripcion",e.target.value)} placeholder="Ej: Camina 10.000 pasos cada día esta semana" style={{width:"100%",padding:"11px 13px",border:"1.5px solid rgba(196,97,74,.18)",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:".85rem",color:K.deep,background:"white",boxSizing:"border-box",minHeight:70,resize:"vertical"}}/>
      </div>
      <div>
        <LBL ch="Tipo de reto"/>
        <select value={f.tipo} onChange={e=>set("tipo",e.target.value)} style={{width:"100%",padding:"11px 13px",border:"1.5px solid rgba(196,97,74,.18)",borderRadius:10,fontFamily:"'DM Sans',sans-serif",fontSize:".85rem",color:K.deep,background:"white",boxSizing:"border-box"}}>
          <option value="boolean">✅ Sí / No — ej: ¿Hiciste sentadillas hoy?</option>
          <option value="numero">🔢 Número — ej: ¿Cuántos pasos diste?</option>
        </select>
      </div>
      {f.tipo==="numero"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><LBL ch="Unidad"/>{INP("unidad","Ej: pasos, vasos, rep")}</div>
        <div><LBL ch="Meta total"/>{INP("meta","Ej: 50000","number")}</div>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div><LBL ch="Fecha inicio"/>{INP("fecha_inicio","","date")}</div>
        <div><LBL ch="Fecha fin"/>{INP("fecha_fin","","date")}</div>
      </div>
    </div>
    <button className="bF" disabled={busy} onClick={crear} style={{marginTop:18}}>{busy?"Creando...":"Publicar reto ✦"}</button>
  </div>;
}

// ── GESTIONAR RETOS (admin) ───────────────────────────────────
function GestionRetos({toast}){
  const [vista,setVista]=useState("lista");
  const [retos,setRetos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [retoRanking,setRetoRanking]=useState(null);

  async function load(){
    setLoading(true);
    const {data}=await sb.from("retos").select("*").order("created_at",{ascending:false});
    setRetos(data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function toggleActivo(reto){
    await sb.from("retos").update({activo:!reto.activo}).eq("id",reto.id);
    toast(reto.activo?"Reto pausado":"Reto activado","");load();
  }
  async function eliminar(id){
    await sb.from("retos").delete().eq("id",id);
    toast("Reto eliminado","");load();
  }

  if(vista==="crear")return <>
    <button onClick={()=>setVista("lista")} style={{background:"none",border:"none",color:K.pink,fontSize:".8rem",fontWeight:700,cursor:"pointer",marginBottom:14,padding:0}}>← Volver</button>
    <CrearReto toast={toast} onCreado={()=>{setVista("lista");load();}}/>
  </>;

  if(retoRanking)return <>
    <button onClick={()=>setRetoRanking(null)} style={{background:"none",border:"none",color:K.pink,fontSize:".8rem",fontWeight:700,cursor:"pointer",marginBottom:14,padding:0}}>← Volver</button>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep,marginBottom:16}}>{retoRanking.titulo}</div>
    <RankingReto reto={retoRanking} userId={null}/>
  </>;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:K.deep}}>Retos</div>
        <div style={{fontSize:".75rem",color:"#9A7A72"}}>{retos.filter(r=>r.activo).length} activos · {retos.length} total</div>
      </div>
      <button className="bP" onClick={()=>setVista("crear")}>+ Nuevo reto</button>
    </div>
    {loading?<Spinner/>:retos.length===0?<div style={{textAlign:"center",padding:"30px 0",color:"#9A7A72"}}>
      <div style={{fontSize:"2.5rem",marginBottom:10}}>🏅</div>
      <div style={{marginBottom:14}}>Sin retos creados aún</div>
      <button className="bP" onClick={()=>setVista("crear")}>Crear primer reto ✦</button>
    </div>:retos.map(reto=>(
      <div key={reto.id} style={{background:"white",borderRadius:16,border:`1.5px solid ${reto.activo?"rgba(233,30,140,.2)":"rgba(0,0,0,.06)"}`,padding:"16px 18px",marginBottom:12,opacity:reto.activo?1:.6}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:".88rem",color:K.deep,marginBottom:3}}>{reto.titulo}</div>
            <div style={{fontSize:".72rem",color:"#9A7A72",marginBottom:6}}>{reto.descripcion}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:".62rem",background:K.lr,color:K.mocha,padding:"3px 10px",borderRadius:20,fontWeight:700}}>{reto.tipo==="boolean"?"✅ Sí/No":"🔢 Número"}</span>
              {reto.activo&&<span style={{fontSize:".62rem",background:"#e8f5e9",color:"#2e7d32",padding:"3px 10px",borderRadius:20,fontWeight:700}}>● Activo</span>}
              {reto.fecha_fin&&<span style={{fontSize:".62rem",background:"#f5f0f0",color:"#9A7A72",padding:"3px 10px",borderRadius:20}}>hasta {reto.fecha_fin}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button onClick={()=>setRetoRanking(reto)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid rgba(136,14,79,.2)`,background:"transparent",color:K.mocha,fontSize:".65rem",fontWeight:700,cursor:"pointer"}}>📊 Ver ranking</button>
            <button onClick={()=>toggleActivo(reto)} style={{padding:"5px 12px",borderRadius:20,border:"none",background:reto.activo?"#fff9c4":"#e8f5e9",color:reto.activo?"#f57f17":"#2e7d32",fontSize:".65rem",fontWeight:700,cursor:"pointer"}}>{reto.activo?"Pausar":"Activar"}</button>
            <button onClick={()=>eliminar(reto.id)} style={{padding:"5px 10px",borderRadius:20,border:"none",background:"#fce4ec",color:K.mocha,fontSize:".65rem",fontWeight:700,cursor:"pointer"}}>✕</button>
          </div>
        </div>
      </div>
    ))}
  </div>;
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("login");
  const [toast,setToast]=useState(null);
  const [checking,setChecking]=useState(true);
  const [dashTab,setDashTab]=useState("logros");

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){
        const {data:perfil}=await sb.from("perfiles").select("*").eq("id",session.user.id).single();
        if(perfil){setUser({...perfil,isAdmin:session.user.email===ADMIN_EMAIL});setPage("booking");}
      }
      setChecking(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_OUT"){setUser(null);setPage("login");}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const login=u=>{setUser(u);if(u.primer_ingreso&&!u.isAdmin){setPage("cambiarClave");}else{setPage("booking");}};
  const logout=async()=>{await sb.auth.signOut();setUser(null);setPage("login");};
  const showToast=(t,s)=>{setToast({t,s});setTimeout(()=>setToast(null),4500);};

  if(checking)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:K.cream,flexDirection:"column",gap:16}}>
    <div className="spin" style={{width:40,height:40,border:`3px solid ${K.lr}`,borderTop:`3px solid ${K.pink}`,borderRadius:"50%"}}/>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:K.mocha}}>AV FITNESS CLUB</div>
  </div>;

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:K.cream,minHeight:"100vh",color:K.deep}}>
    <nav style={{position:"fixed",top:0,width:"100%",zIndex:200,padding:"11px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,240,245,.97)",borderBottom:"1px solid rgba(244,143,177,.22)",boxSizing:"border-box",flexWrap:"wrap",gap:8}}>
      <Logo size="sm" onClick={()=>user&&setPage("booking")}/>
      <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
        {user&&<span style={{fontSize:".72rem",color:K.mocha,fontWeight:600}}>{user.nombre?.split(" ")[0]} ✦</span>}
        {user?.isAdmin&&<button className="bD" onClick={()=>setPage("admin")}>⚙ Admin</button>}
        {user&&<button className="bO" onClick={()=>setPage("dash")}>Mi perfil</button>}
        {user&&<button className="bP" onClick={()=>setPage("booking")}>Reservar</button>}
        {user&&<button className="bO" onClick={logout}>Salir</button>}
        {!user&&<button className="bP" onClick={()=>setPage("login")}>Iniciar sesión</button>}
      </div>
    </nav>
    {page==="login"&&<Auth onLogin={login}/>}
    {page==="cambiarClave"&&user&&<CambiarClave user={user} onDone={()=>{setUser(u=>({...u,primer_ingreso:false}));setPage("booking");}}/>}
    {page==="booking"&&user&&<Booking user={user} setUser={setUser} toast={showToast} onVerRanking={()=>{setDashTab("ranking");setPage("dash");}}/>}
    {page==="dash"&&user&&<Dash user={user} onBook={()=>setPage("booking")} initTab={dashTab} onTabChange={setDashTab}/>}
    {page==="admin"&&user?.isAdmin&&<Admin toast={showToast}/>}
    <Toast msg={toast}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
